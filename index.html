<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>GitHub Lottie Demo</title>
    <!-- Lottie লাইব্রেরি -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>

    <!-- অ্যানিমেশন দেখানোর জায়গা -->
    <div id="bowl-animation" style="width: 250px; height: 250px; margin: 50px auto;"></div>

    <script>
        window.addEventListener('load', () => {
            lottie.loadAnimation({
                container: document.getElementById('bowl-animation'),
                renderer: 'svg',
                loop: true,
                autoplay: true,
                // গিটহাবে ফাইলের নাম ঠিক এভাবেই দেবেন
                path: 'steaming-bowl.json' 
            });
        });
    </script>

</body>
</html>
